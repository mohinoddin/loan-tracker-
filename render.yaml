services:
  - type: web
    name: loan-tracker
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/loan-tracker run build &&
      pnpm --filter @workspace/api-server run build &&
      cp -r artifacts/loan-tracker/dist/public artifacts/api-server/dist/public
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
